<div class="max-w-5xl mx-auto space-y-8 relative">
  <!-- Glowing Background Orbs -->
  <div class="absolute top-0 right-0 w-64 h-64 bg-maximo-cyan/10 blur-[100px] rounded-full point-events-none"></div>

  <div class="flex flex-col md:flex-row justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5 relative z-10">
    <div class="flex-1 w-full md:w-auto mb-4 md:mb-0">
      <input type="text" [(ngModel)]="keyword" (keyup.enter)="onSearch()" placeholder="Search articles..." class="input-field w-full md:max-w-md">
    </div>
    <div class="flex gap-4 items-center">
      <button (click)="onSearch()" class="btn-secondary whitespace-nowrap">Search</button>
      <a *ngIf="authService.isAuthenticated()" routerLink="/articles/new" class="btn-primary whitespace-nowrap">+ New Article</a>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="w-12 h-12 border-4 border-maximo-cyan border-t-transparent rounded-full animate-spin shadow-neon-cyan"></div>
  </div>

  <div *ngIf="!loading && articles.length === 0" class="text-center py-20 text-gray-400 glass-panel">
    <p>No articles found matching your criteria.</p>
  </div>

  <div *ngIf="!loading && articles.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
    <div *ngFor="let article of articles" class="glass-panel p-6 hover:-translate-y-1 hover:shadow-neon-cyan transition-all duration-300 group cursor-pointer flex flex-col h-full" [routerLink]="['/articles', article.id]">
      
      <div class="flex justify-between items-start mb-3">
        <span class="text-xs font-bold px-2 py-1 rounded bg-maximo-cyan/20 text-maximo-cyan hover:bg-maximo-cyan hover:text-black transition-colors uppercase tracking-wider">{{ article.category }}</span>
        <span class="text-xs text-gray-500">{{ article.createdAt | date:'mediumDate' }}</span>
      </div>
      
      <h3 class="text-2xl font-bold text-white mb-3 group-hover:text-maximo-cyan transition-colors">{{ article.title }}</h3>
      
      <p class="text-gray-400 text-sm mb-6 flex-grow line-clamp-3">{{ article.content }}</p>
      
      <div class="pt-4 border-t border-white/10 flex items-center justify-between">
        <div class="flex items-center gap-2 text-xs text-gray-400">
          <div class="w-8 h-8 rounded-full bg-maximo-purple/30 flex items-center justify-center text-white font-bold">{{ article.authorName.charAt(0) }}</div>
          <span class="font-medium text-white">{{ article.authorName }}</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Pagination -->
  <div *ngIf="totalPages > 1 && !loading" class="flex justify-center gap-4 mt-8">
    <button (click)="prevPage()" [disabled]="currentPage === 0" class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed px-4 py-2">&larr; Prev</button>
    <span class="flex items-center text-gray-400 text-sm">Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1" class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed px-4 py-2">Next &rarr;</button>
  </div>
</div>
