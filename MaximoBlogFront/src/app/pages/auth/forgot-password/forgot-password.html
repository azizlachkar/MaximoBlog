<div class="min-h-[70vh] flex items-center justify-center relative">
  <!-- Decorative background glows -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-maximo-pink/10 blur-[100px] rounded-full point-events-none"></div>
  
  <div class="glass-panel p-8 w-full max-w-md relative z-10">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-display text-white mb-2">System Recovery</h2>
      <p class="text-gray-400 text-sm">Enter your email to receive a password reset link</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 rounded bg-red-500/10 border border-red-500/50 text-red-400 text-sm text-center">
      {{ errorMessage }}
    </div>

    <div *ngIf="message" class="mb-6 p-4 rounded bg-green-500/10 border border-green-500/50 text-green-400 text-sm text-center">
      {{ message }}
    </div>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Registered Email</label>
        <input type="email" name="email" [(ngModel)]="email" required class="input-field border-maximo-pink/30 focus:border-maximo-pink focus:ring-maximo-pink" placeholder="hacker@maximo.com">
      </div>

      <button type="submit" [disabled]="forgotForm.invalid || isLoading" class="relative w-full flex justify-center py-3 px-6 rounded-lg font-semibold text-white overflow-hidden transition-all duration-300 bg-gradient-to-r from-maximo-pink to-maximo-purple disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(255,0,127,0.5)] hover:shadow-[0_0_20px_rgba(255,0,127,0.8)] hover:-translate-y-0.5">
        <span *ngIf="!isLoading">Send Recovery Link</span>
        <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>

    </form>

    <div class="mt-8 flex justify-between items-center text-sm">
      <a routerLink="/login" class="text-gray-400 hover:text-white transition-colors">&larr; Back to Login</a>
    </div>
  </div>
</div>
