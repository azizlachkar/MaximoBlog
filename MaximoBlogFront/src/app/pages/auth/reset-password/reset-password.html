<div class="min-h-[70vh] flex items-center justify-center relative">
  <!-- Decorative background glows -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-maximo-cyan/10 blur-[100px] rounded-full point-events-none"></div>
  
  <div class="glass-panel p-8 w-full max-w-md relative z-10">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-display text-white mb-2">Reset Security Key</h2>
      <p class="text-gray-400 text-sm">Enter your new password below</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 rounded bg-red-500/10 border border-red-500/50 text-red-400 text-sm text-center">
      {{ errorMessage }}
    </div>

    <div *ngIf="message" class="mb-6 p-4 rounded bg-green-500/10 border border-green-500/50 text-green-400 text-sm text-center">
      {{ message }} <br>
      <span class="text-xs">Redirecting to login...</span>
    </div>

    <form *ngIf="!message" (ngSubmit)="onSubmit()" #resetForm="ngForm" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">New Password</label>
        <input type="password" name="newPassword" [(ngModel)]="newPassword" required minlength="6" class="input-field" placeholder="••••••••">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Confirm New Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="6" class="input-field" placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="resetForm.invalid || isLoading || !token" class="btn-primary w-full flex justify-center py-3 disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="!isLoading">Update Password</span>
        <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>

    </form>
  </div>
</div>
