<div class="min-h-[70vh] flex items-center justify-center relative">
  <!-- Decorative background glows -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-maximo-cyan/10 blur-[100px] rounded-full point-events-none"></div>
  
  <div class="glass-panel p-8 w-full max-w-md relative z-10 text-center">
    
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-8">
      <div class="w-12 h-12 border-4 border-maximo-cyan border-t-transparent rounded-full animate-spin shadow-neon-cyan mb-4"></div>
      <p class="text-gray-400">Verifying your profile...</p>
    </div>

    <div *ngIf="!isLoading">
      <div *ngIf="isSuccess" class="mb-6">
        <svg class="w-16 h-16 text-maximo-cyan mx-auto mb-4 drop-shadow-neon-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="text-2xl font-display text-white mb-2">Access Granted</h2>
        <p class="text-gray-400">{{ message }}</p>
        <a routerLink="/login" class="btn-primary inline-block mt-8">Proceed to Login</a>
      </div>

      <div *ngIf="!isSuccess" class="mb-6">
        <svg class="w-16 h-16 text-maximo-purple mx-auto mb-4 drop-shadow-neon-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="text-2xl font-display text-white mb-2">Verification Error</h2>
        <p class="text-gray-400">{{ message }}</p>
        <div class="flex flex-col gap-4 mt-8">
          <a routerLink="/login" class="btn-secondary">Back to Login</a>
          <a routerLink="/register" class="text-sm text-maximo-cyan hover:text-white transition-colors">Resend Verification Email</a>
        </div>
      </div>
    </div>

  </div>
</div>
