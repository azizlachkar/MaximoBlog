<div class="mt-12 pt-8 border-t border-white/10">
  <h3 class="text-2xl font-display text-white mb-6 flex items-center gap-3">
    Comments <span class="bg-maximo-purple/20 text-maximo-purple text-sm px-3 py-1 rounded-full font-mono">{{ comments.length }}</span>
  </h3>

  <!-- New Comment Input -->
  <div *ngIf="authService.isAuthenticated(); else loginPrompt" class="mb-10 p-6 glass-panel border border-maximo-cyan/20">
    <textarea [(ngModel)]="newCommentContent" rows="3" class="input-field mb-3 bg-black/50" placeholder="Encode your thoughts here..."></textarea>
    <div class="flex justify-end">
      <button (click)="postComment()" [disabled]="!newCommentContent" class="btn-primary px-8 transform scale-90 origin-right disabled:opacity-50">Transmit</button>
    </div>
  </div>
  <ng-template #loginPrompt>
    <div class="p-6 glass-panel text-center mb-10 text-gray-400 text-sm">
      You must <a routerLink="/login" class="text-maximo-cyan hover:text-white transition-colors">log in</a> to establish an uplink and post comments.
    </div>
  </ng-template>

  <!-- Nested Template for Recursive Replies -->
  <ng-template #commentTemplate let-commentList="commentList" let-depth="depth">
    <div *ngFor="let comment of commentList" class="mb-4 relative" [ngClass]="{'ml-8 md:ml-12 pl-4 border-l-2 border-maximo-purple/30': depth > 0}">
      
      <div class="p-4 bg-white/5 rounded-lg border border-white/5 hover:border-white/10 transition-colors">
        <div class="flex justify-between items-start mb-2">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-maximo-cyan/20 flex items-center justify-center text-maximo-cyan font-bold text-sm">
              {{ comment.authorName.charAt(0) }}
            </div>
            <div>
              <div class="font-bold text-sm text-gray-200">{{ comment.authorName }}</div>
              <div class="text-xs text-gray-500">{{ comment.createdAt | date:'short' }}</div>
            </div>
          </div>
          <button *ngIf="isOwner(comment.id, comment.authorName)" (click)="deleteComment(comment.id)" class="text-gray-500 hover:text-red-400 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>

        <p class="text-gray-300 text-sm mb-3 whitespace-pre-line">{{ comment.content }}</p>

        <!-- Action Bar -->
        <div class="flex items-center gap-4 text-xs font-semibold">
          <button *ngIf="depth < 2 && authService.isAuthenticated()" (click)="startReply(comment.id)" class="text-gray-500 hover:text-maximo-cyan transition-colors tracking-wider">REPLY</button>
        </div>

        <!-- Inline Reply Input -->
        <div *ngIf="replyingToId === comment.id" class="mt-4 pt-4 border-t border-white/5">
          <textarea [(ngModel)]="replyContent" rows="2" class="input-field text-sm mb-2" placeholder="Formulate reply..."></textarea>
          <div class="flex justify-end gap-2">
            <button (click)="cancelReply()" class="btn-secondary text-xs px-3 py-1">Abort</button>
            <button (click)="postReply(comment.id)" [disabled]="!replyContent" class="btn-primary text-xs px-4 py-1 disabled:opacity-50">Send</button>
          </div>
        </div>
      </div>

      <!-- Recursive call for replies -->
      <div *ngIf="comment.replies && comment.replies.length > 0" class="mt-4">
        <ng-container *ngTemplateOutlet="commentTemplate; context: { commentList: comment.replies, depth: depth + 1 }"></ng-container>
      </div>

    </div>
  </ng-template>

  <!-- Root Comments -->
  <ng-container *ngTemplateOutlet="commentTemplate; context: { commentList: comments, depth: 0 }"></ng-container>

</div>
